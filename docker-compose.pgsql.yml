services:
  app:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-ebfakturka}
      DB_USERNAME: ${DB_USERNAME:-ebfakturka}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - app_storage:/var/www/html/storage

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ebfakturka}
      POSTGRES_USER: ${DB_USERNAME:-ebfakturka}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ebfakturka} -d ${DB_DATABASE:-ebfakturka}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  pgsql_data:
  app_storage:
