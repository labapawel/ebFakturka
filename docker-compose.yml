services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: ${APP_NAME:-ebFakturka}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_LOCALE: pl
      APP_FALLBACK_LOCALE: pl

      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-error}

      BIR_KEY: ${BIR_KEY:-}
      VAT_EXEMPT: ${VAT_EXEMPT:-vat}
      VAT_EXEMPT_REASON_TYPE: ${VAT_EXEMPT_REASON_TYPE:-P_19A}
      VAT_EXEMPT_REASON_TEXT: ${VAT_EXEMPT_REASON_TEXT:-}
      KSEF_token: ${KSEF_token:-}
      KSEF_url: ${KSEF_url:-https://api-demo.ksef.mf.gov.pl/v2}
      KSEF_CRT: ${KSEF_CRT:-}
      KSEF_KEY: ${KSEF_KEY:-}
      KSEF_PASS: ${KSEF_PASS:-}
    volumes:
      - db_data:/var/www/html/database
      - app_storage:/var/www/html/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  db_data:
  app_storage:
